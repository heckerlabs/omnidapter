api:
  specs:
    - openapi: openapi/openapi.json
      overrides: openapi/overrides.yml

default-group: sdk

groups:
  sdk:
    generators:
      - name: fernapi/fern-typescript-node-sdk
        version: 3.63.8
        output:
          location: local-file-system
          path: ../client/packages/sdk
      - name: fernapi/fern-python-sdk
        version: 4.4.0
        output:
          location: local-file-system
          path: ../omnidapter-sdk/omnidapter_sdk
        config:
          package_name: omnidapter_sdk
