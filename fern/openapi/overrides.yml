# OpenAPI overlay — Fern SDK grouping and naming overrides.
# Adds x-fern-sdk-group-name to every path so Fern generates a
# resource-grouped client (client.connections.list(), etc.)
# Paths under /connect/, /health, and /oauth/ are internal/UI routes
# and are excluded from the SDK via x-fern-ignore.
overlay: 1.0.0
info:
  title: Omnidapter SDK Overrides
  version: 0.0.0
actions:
  # --- Exclude internal/UI routes ---
  - target: "$.paths['/health']"
    update:
      x-fern-ignore: true
  - target: "$.paths['/connect/connections']"
    update:
      x-fern-ignore: true
  - target: "$.paths['/connect/providers']"
    update:
      x-fern-ignore: true
  - target: "$.paths['/connect/session']"
    update:
      x-fern-ignore: true
  - target: "$.paths['/oauth/{provider_key}/callback']"
    update:
      x-fern-ignore: true

  # --- Auth ---
  - target: "$.paths['/v1/auth/login']"
    update:
      x-fern-sdk-group-name: auth
  - target: "$.paths['/v1/auth/callback']"
    update:
      x-fern-sdk-group-name: auth
  - target: "$.paths['/v1/auth/me']"
    update:
      x-fern-sdk-group-name: auth

  # --- Connections ---
  - target: "$.paths['/v1/connections']"
    update:
      x-fern-sdk-group-name: connections
  - target: "$.paths['/v1/connections/{connection_id}']"
    update:
      x-fern-sdk-group-name: connections
  - target: "$.paths['/v1/connections/{connection_id}/reauthorize']"
    update:
      x-fern-sdk-group-name: connections

  # --- Calendars ---
  - target: "$.paths['/v1/connections/{connection_id}/calendars']"
    update:
      x-fern-sdk-group-name: calendars
  - target: "$.paths['/v1/connections/{connection_id}/calendars/{calendar_id}']"
    update:
      x-fern-sdk-group-name: calendars
  - target: "$.paths['/v1/connections/{connection_id}/calendars/{calendar_id}/availability']"
    update:
      x-fern-sdk-group-name: calendars

  # --- Events ---
  - target: "$.paths['/v1/connections/{connection_id}/calendars/{calendar_id}/events']"
    update:
      x-fern-sdk-group-name: events
  - target: "$.paths['/v1/connections/{connection_id}/calendars/{calendar_id}/events/{event_id}']"
    update:
      x-fern-sdk-group-name: events

  # --- Link Tokens ---
  - target: "$.paths['/v1/link-tokens']"
    update:
      x-fern-sdk-group-name: link_tokens

  # --- Providers ---
  - target: "$.paths['/v1/providers']"
    update:
      x-fern-sdk-group-name: providers

  # --- Provider Configs ---
  - target: "$.paths['/v1/provider-configs']"
    update:
      x-fern-sdk-group-name: provider_configs
  - target: "$.paths['/v1/provider-configs/{provider_key}']"
    update:
      x-fern-sdk-group-name: provider_configs

  # --- Dashboard ---
  - target: "$.paths['/v1/dashboard/profile']"
    update:
      x-fern-sdk-group-name: dashboard
  - target: "$.paths['/v1/dashboard/tenant']"
    update:
      x-fern-sdk-group-name: dashboard
  - target: "$.paths['/v1/dashboard/usage']"
    update:
      x-fern-sdk-group-name: dashboard
  - target: "$.paths['/v1/dashboard/members']"
    update:
      x-fern-sdk-group-name: dashboard
  - target: "$.paths['/v1/dashboard/members/{user_id}']"
    update:
      x-fern-sdk-group-name: dashboard
  - target: "$.paths['/v1/dashboard/connections']"
    update:
      x-fern-sdk-group-name: dashboard
  - target: "$.paths['/v1/dashboard/connections/{connection_id}']"
    update:
      x-fern-sdk-group-name: dashboard
  - target: "$.paths['/v1/dashboard/provider-configs']"
    update:
      x-fern-sdk-group-name: dashboard
  - target: "$.paths['/v1/dashboard/provider-configs/{provider_key}']"
    update:
      x-fern-sdk-group-name: dashboard

  # --- Remove path params from request body schemas (they're already path params) ---
  - target: "$.components.schemas.CreateEventRequest.properties.calendar_id"
    remove: true
  - target: "$.components.schemas.UpdateCalendarRequest.properties.calendar_id"
    remove: true
  - target: "$.components.schemas.UpdateEventRequest.properties.calendar_id"
    remove: true
  - target: "$.components.schemas.UpdateEventRequest.properties.event_id"
    remove: true

  # --- API Keys ---
  - target: "$.paths['/v1/dashboard/api-keys']"
    update:
      x-fern-sdk-group-name: api_keys
  - target: "$.paths['/v1/dashboard/api-keys/{key_id}']"
    update:
      x-fern-sdk-group-name: api_keys
