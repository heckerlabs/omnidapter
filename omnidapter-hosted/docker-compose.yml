services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: omnidapter
      POSTGRES_USER: omnidapter
      POSTGRES_PASSWORD: omnidapter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnidapter -d omnidapter"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: omnidapter-hosted/Dockerfile
    restart: "no"
    env_file: .env
    environment:
      OMNIDAPTER_DATABASE_URL: ${OMNIDAPTER_DATABASE_URL:-postgresql+asyncpg://omnidapter:omnidapter@db:5432/omnidapter}
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "cd omnidapter-hosted && /app/.venv/bin/alembic -c alembic.ini upgrade head"]

  api:
    build:
      context: ..
      dockerfile: omnidapter-hosted/Dockerfile
    restart: "no"
    profiles: ["production"]
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file: .env
    environment:
      OMNIDAPTER_DATABASE_URL: ${OMNIDAPTER_DATABASE_URL:-postgresql+asyncpg://omnidapter:omnidapter@db:5432/omnidapter}
      OMNIDAPTER_OAUTH_STATE_REDIS_URL: ${OMNIDAPTER_OAUTH_STATE_REDIS_URL:-redis://redis:6379/0}
      HOSTED_RATE_LIMIT_REDIS_URL: ${HOSTED_RATE_LIMIT_REDIS_URL:-redis://redis:6379/1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
