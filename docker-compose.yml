services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: omnidapter
      POSTGRES_USER: omnidapter
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnidapter -d omnidapter"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/omnidapter-server/Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      OMNIDAPTER_DATABASE_URL: postgresql+asyncpg://omnidapter:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/omnidapter
      OMNIDAPTER_ENCRYPTION_KEY: ${OMNIDAPTER_ENCRYPTION_KEY:?OMNIDAPTER_ENCRYPTION_KEY is required}
      OMNIDAPTER_BASE_URL: ${OMNIDAPTER_BASE_URL:-http://localhost:8000}
      OMNIDAPTER_ENV: ${OMNIDAPTER_ENV:-production}
      OMNIDAPTER_ALLOWED_ORIGIN_DOMAINS: ${OMNIDAPTER_ALLOWED_ORIGIN_DOMAINS:-*}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
      # OAuth provider credentials (at least one required)
      OMNIDAPTER_GOOGLE_CLIENT_ID: ${OMNIDAPTER_GOOGLE_CLIENT_ID:-}
      OMNIDAPTER_GOOGLE_CLIENT_SECRET: ${OMNIDAPTER_GOOGLE_CLIENT_SECRET:-}
      OMNIDAPTER_MICROSOFT_CLIENT_ID: ${OMNIDAPTER_MICROSOFT_CLIENT_ID:-}
      OMNIDAPTER_MICROSOFT_CLIENT_SECRET: ${OMNIDAPTER_MICROSOFT_CLIENT_SECRET:-}
      OMNIDAPTER_ZOHO_CLIENT_ID: ${OMNIDAPTER_ZOHO_CLIENT_ID:-}
      OMNIDAPTER_ZOHO_CLIENT_SECRET: ${OMNIDAPTER_ZOHO_CLIENT_SECRET:-}
      # Optional server behavior
      OMNIDAPTER_FALLBACK_CONNECTION_LIMIT: ${OMNIDAPTER_FALLBACK_CONNECTION_LIMIT:-5}
      OMNIDAPTER_REAUTH_THRESHOLD: ${OMNIDAPTER_REAUTH_THRESHOLD:-3}
      # OAuth state store (optional)
      OMNIDAPTER_OAUTH_STATE_REDIS_URL: ${OMNIDAPTER_OAUTH_STATE_REDIS_URL:-}
      OMNIDAPTER_OAUTH_STATE_DB_URL: ${OMNIDAPTER_OAUTH_STATE_DB_URL:-}
    depends_on:
      db:
        condition: service_healthy
    command: >-
      sh -c "if [ \"$${RUN_MIGRATIONS}\" = \"true\" ]; then uv run alembic upgrade head; fi
      && exec uv run uvicorn omnidapter_server.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
