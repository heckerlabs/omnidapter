name: Release Dispatch

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to release
        required: true
        type: choice
        options:
          - omnidapter-core  # PyPI project name is "omnidapter" (see omnidapter-core/pyproject.toml)
          - omnidapter-server
          - omnidapter-connect
      version:
        description: Version (e.g., 1.0.0)
        required: true
        type: string
      dry-run:
        description: Dry run (test without publishing)
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.event.inputs.package }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      type: ${{ steps.detect.outputs.type }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format. Use semver: 1.0.0"
            exit 1
          fi
          echo "✓ Version format valid: $VERSION"

      - name: Check version doesn't already exist
        run: |
          PACKAGE="${{ github.event.inputs.package }}"
          VERSION="${{ github.event.inputs.version }}"
          if git rev-parse "$PACKAGE/v$VERSION" >/dev/null 2>&1; then
            echo "❌ Release $PACKAGE/v$VERSION already exists"
            exit 1
          fi
          echo "✓ Version not yet released"

      - name: Detect package type
        id: detect
        run: |
          PACKAGE="${{ github.event.inputs.package }}"
          if [[ "$PACKAGE" == "omnidapter-connect" ]]; then
            echo "type=js" >> $GITHUB_OUTPUT
          else
            echo "type=python" >> $GITHUB_OUTPUT
          fi

  test-python:
    needs: validate
    if: needs.validate.outputs.type == 'python'
    uses: ./.github/workflows/_test-python.yml

  test-js:
    needs: validate
    if: needs.validate.outputs.type == 'js'
    uses: ./.github/workflows/_test-js.yml
    with:
      package: '@heckerlabs/omnidapter-connect'

  bump:
    needs: [validate, test-python, test-js]
    if: always() && !failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update version (Python)
        if: needs.validate.outputs.type == 'python'
        run: |
          PACKAGE="${{ github.event.inputs.package }}"
          VERSION="${{ github.event.inputs.version }}"
          FILE="$PACKAGE/pyproject.toml"

          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" "$FILE" 2>/dev/null || \
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" "$FILE"

          grep -q "version = \"$VERSION\"" "$FILE" && echo "✓ Updated $PACKAGE"

      - name: Update version (JS)
        if: needs.validate.outputs.type == 'js'
        run: |
          VERSION="${{ github.event.inputs.version }}"
          npm version "$VERSION" --prefix client/packages/connect-sdk --no-git-tag-version
          echo "✓ Updated omnidapter-connect"

      - name: Create release branch and PR
        if: ${{ !github.event.inputs.dry-run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PACKAGE="${{ github.event.inputs.package }}"
          VERSION="${{ github.event.inputs.version }}"
          BRANCH="release/$PACKAGE-v$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          if [[ "${{ needs.validate.outputs.type }}" == "python" ]]; then
            git add "$PACKAGE/pyproject.toml"
          else
            git add client/packages/connect-sdk/package.json client/package-lock.json
          fi

          git commit -m "Release $PACKAGE v$VERSION"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Release $PACKAGE v$VERSION" \
            --body "Automated release PR for $PACKAGE v$VERSION. Review and merge to publish." \
            --label release

      - name: Dry run (not creating PR)
        if: ${{ github.event.inputs.dry-run }}
        run: |
          PACKAGE="${{ github.event.inputs.package }}"
          VERSION="${{ github.event.inputs.version }}"
          echo "✓ DRY RUN: Would release $PACKAGE v$VERSION"
          echo "✓ Tests passed"
          echo "✓ Version ready for bump"
          echo ""
          echo "To actually release, run Release Dispatch again with dry-run=false"
