name: Publish Python Package

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
        description: Python package name (e.g., omnidapter-core)
      dry-run:
        required: false
        type: boolean
        default: false
        description: Dry run (build only, don't publish)

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Build package
        run: uv build ${{ inputs.package }}

      - name: Publish to PyPI
        if: ${{ !inputs.dry-run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ inputs.package }}/dist/
          verbose: true

      - name: Dry run (build only)
        if: ${{ inputs.dry-run }}
        run: echo "✓ Dry run: built ${{ inputs.package }} successfully (not publishing)"
