name: Publish Python Package

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
        description: Python package name (e.g., omnidapter-core)
      version:
        required: true
        type: string
        description: Version to publish (e.g., 1.0.0)
      dry-run:
        required: false
        type: boolean
        default: false
        description: Dry run (build only, don't publish)

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Check version not already on PyPI
        if: ${{ !inputs.dry-run }}
        run: |
          PYPI_NAME=$(grep '^name' "${{ inputs.package }}/pyproject.toml" | sed 's/name = "\(.*\)"/\1/')
          VERSION="${{ inputs.version }}"
          if curl -sf "https://pypi.org/pypi/$PYPI_NAME/$VERSION/json" > /dev/null 2>&1; then
            echo "❌ $PYPI_NAME v$VERSION already exists on PyPI"
            exit 1
          fi
          echo "✓ $PYPI_NAME v$VERSION not yet on PyPI"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Build package
        run: |
          cd ${{ inputs.package }}
          uv build

      - name: Publish to PyPI
        if: ${{ !inputs.dry-run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ inputs.package }}/dist/
          verbose: true

      - name: Dry run (build only)
        if: ${{ inputs.dry-run }}
        run: echo "✓ Dry run: built ${{ inputs.package }} successfully (not publishing)"
