name: Release Publish

on:
  pull_request:
    types: [closed]

concurrency:
  group: release-publish-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: false

jobs:
  parse:
    if: github.event.pull_request.merged && contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.parse.outputs.package }}
      version: ${{ steps.parse.outputs.version }}
      type: ${{ steps.parse.outputs.type }}
    steps:
      - name: Parse PR title
        id: parse
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if [[ $TITLE =~ Release\ (omnidapter-[a-z-]+)\ v([0-9.]+) ]]; then
            PACKAGE="${BASH_REMATCH[1]}"
            VERSION="${BASH_REMATCH[2]}"
            if [[ "$PACKAGE" == "omnidapter-connect" ]]; then
              TYPE="js"
            else
              TYPE="python"
            fi
            echo "package=$PACKAGE" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "type=$TYPE" >> $GITHUB_OUTPUT
            echo "✓ Publishing $PACKAGE v$VERSION"
          else
            echo "❌ Could not parse PR title: $TITLE"
            exit 1
          fi

  test-python:
    needs: parse
    if: needs.parse.outputs.type == 'python'
    uses: ./.github/workflows/_test-python.yml

  test-js:
    needs: parse
    if: needs.parse.outputs.type == 'js'
    uses: ./.github/workflows/_test-js.yml
    with:
      package: '@heckerlabs/omnidapter-connect'

  publish-python:
    needs: [parse, test-python]
    if: needs.parse.outputs.type == 'python'
    uses: ./.github/workflows/_publish-python.yml
    with:
      package: ${{ needs.parse.outputs.package }}

  publish-docker:
    needs: [parse, test-python]
    if: needs.parse.outputs.package == 'omnidapter-server'
    uses: ./.github/workflows/_publish-docker.yml
    with:
      version: ${{ needs.parse.outputs.version }}

  publish-js:
    needs: [parse, test-js]
    if: needs.parse.outputs.type == 'js'
    uses: ./.github/workflows/_publish-js.yml
    with:
      package: '@heckerlabs/omnidapter-connect'
      package-dir: client/packages/connect-sdk

  tag:
    needs: [parse, publish-python, publish-js, publish-docker]
    if: always() && !failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create git tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          PACKAGE="${{ needs.parse.outputs.package }}"
          VERSION="${{ needs.parse.outputs.version }}"
          TAG="$PACKAGE/v$VERSION"

          git tag -a "$TAG" -m "Release $PACKAGE v$VERSION"
          git push origin "$TAG"

          gh release create "$TAG" \
            --title "$PACKAGE v$VERSION" \
            --notes "See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." \
            --target ${{ github.event.pull_request.merge_commit_sha }}

          echo "✓ Created GitHub release: $TAG"
