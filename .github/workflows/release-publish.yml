name: Release Publish

on:
  pull_request:
    types: [closed]

concurrency:
  group: release-publish
  cancel-in-progress: false

permissions:
  packages: write
  id-token: write
  contents: write

jobs:
  parse:
    if: |
      github.event.pull_request.merged &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse version from PR title
        id: parse
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if [[ $TITLE =~ Release\ v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "✓ Releasing v$VERSION"
          else
            echo "❌ Could not parse version from PR title: $TITLE"
            exit 1
          fi

  publish:
    needs: parse
    uses: ./.github/workflows/_publish-docker.yml
    with:
      version: ${{ needs.parse.outputs.version }}

  tag:
    needs: [parse, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Create git tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.parse.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "Docker image: \`ghcr.io/${{ github.repository_owner }}/omnidapter-server:$VERSION\`" \
            --target ${{ github.event.pull_request.merge_commit_sha }}

          echo "✓ Released v$VERSION"
