name: Release Publish

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: release-publish
  cancel-in-progress: false

permissions:
  packages: write
  id-token: write
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
    steps:
      - id: check
        env:
          IS_MERGED: ${{ github.event.pull_request.merged }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          IS_INTERNAL: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'release') }}
        run: |
          if [[ "$IS_MERGED" == "true" && "$IS_INTERNAL" == "true" && "$HEAD_REF" =~ ^release/ && "$HAS_LABEL" == "true" ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "✓ Release PR detected: $HEAD_REF"
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "Not a release PR — skipping publish."
          fi

  parse:
    needs: check
    if: needs.check.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse version from branch name
        id: parse
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          if [[ $BRANCH =~ ^release/v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "✓ Releasing v$VERSION"
          else
            echo "❌ Could not parse version from branch: $BRANCH"
            exit 1
          fi

  publish-docker:
    needs: parse
    uses: ./.github/workflows/_publish-docker.yml
    with:
      version: ${{ needs.parse.outputs.version }}

  publish-omnidapter-sdk:
    needs: parse
    uses: ./.github/workflows/_publish-pypi.yml
    with:
      version: ${{ needs.parse.outputs.version }}
      package_dir: omnidapter-sdk
      package_name: omnidapter-sdk
      generate_sdk: true
    secrets:
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

  publish-connect:
    needs: parse
    uses: ./.github/workflows/_publish-npm.yml
    with:
      version: ${{ needs.parse.outputs.version }}
      workspace: "@omnidapter/connect"
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-sdk:
    needs: parse
    uses: ./.github/workflows/_publish-npm.yml
    with:
      version: ${{ needs.parse.outputs.version }}
      workspace: "@omnidapter/sdk"
      generate_sdk: true
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  tag:
    needs: [parse, publish-docker, publish-omnidapter-sdk, publish-connect, publish-sdk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Create git tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.parse.outputs.version }}
          REPO_OWNER: ${{ github.repository_owner }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

          {
            echo "## Packages"
            echo ""
            echo "**Docker:** \`ghcr.io/$REPO_OWNER/omnidapter-server:$VERSION\`"
            echo ""
            echo "**PyPI:**"
            echo "- \`pip install omnidapter-sdk==$VERSION\`"
            echo ""
            echo "**npm:**"
            echo "- \`npm install @omnidapter/connect@$VERSION\`"
            echo "- \`npm install @omnidapter/sdk@$VERSION\`"
          } > /tmp/release_notes.md

          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file /tmp/release_notes.md \
            --target "$MERGE_SHA"

          echo "✓ Released v$VERSION"
