name: Publish npm Package

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: Package version to publish
      workspace:
        required: true
        type: string
        description: npm workspace name (e.g. @omnidapter/connect)
      generate_sdk:
        required: false
        type: boolean
        default: false
        description: Run generate_sdks.sh before building
    secrets:
      NPM_TOKEN:
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: astral-sh/setup-uv@v5
        if: inputs.generate_sdk

      - name: Generate SDKs
        if: inputs.generate_sdk
        run: bash scripts/generate_sdks.sh

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build package
        env:
          WORKSPACE: ${{ inputs.workspace }}
        run: npm run build -w "$WORKSPACE"
        working-directory: client

      - name: Check version not already published
        env:
          VERSION: ${{ inputs.version }}
          WORKSPACE: ${{ inputs.workspace }}
        run: |
          EXISTING=$(npm view "$WORKSPACE@$VERSION" version 2>/dev/null || echo "")
          if [[ -n "$EXISTING" ]]; then
            echo "❌ $WORKSPACE@$VERSION already published to npm"
            exit 1
          fi
          echo "✓ $WORKSPACE@$VERSION not yet published"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          WORKSPACE: ${{ inputs.workspace }}
        run: npm publish -w "$WORKSPACE" --access public
        working-directory: client
