name: Publish PyPI Package

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: Package version to publish
      package_name:
        required: true
        type: string
        description: PyPI package name for version check (e.g. omnidapter-sdk)
      generate_sdk:
        required: false
        type: boolean
        default: false
        description: Run generate_sdks.sh before building
      environment:
        required: true
        type: string
        description: GitHub Actions environment for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v5

      - name: Generate Python SDK
        if: inputs.generate_sdk
        run: bash scripts/generate_sdks.sh python

      - name: Check version not already published
        id: check
        env:
          VERSION: ${{ inputs.version }}
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: |
          if curl -sf "https://pypi.org/pypi/$PACKAGE_NAME/$VERSION/json" > /dev/null; then
            echo "::warning::$PACKAGE_NAME==$VERSION already published to PyPI — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "✓ $PACKAGE_NAME==$VERSION not yet on PyPI"
          fi

      - name: Build package
        if: steps.check.outputs.skip != 'true'
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: uv build --package "$PACKAGE_NAME"

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true'
        run: uv publish
