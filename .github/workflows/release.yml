name: Cut Release from main

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version (e.g., 1.2.3)
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate version format
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format. Use semver: 1.2.3"
            exit 1
          fi
          echo "✓ Version format valid: $VERSION"

      - name: Check version not already tagged
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          git fetch --tags
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "❌ Tag v$VERSION already exists"
            exit 1
          fi
          echo "✓ Version not yet released"

  test:
    needs: validate
    uses: ./.github/workflows/_test-python.yml

  test-sdk:
    needs: validate
    uses: ./.github/workflows/_test-sdk.yml

  open-pr:
    needs: [validate, test, test-sdk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      VERSION: ${{ github.event.inputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Bump Python package versions
        run: |
          for FILE in omnidapter-core/pyproject.toml omnidapter-server/pyproject.toml omnidapter-sdk/pyproject.toml; do
            CURRENT=$(grep '^version = ' "$FILE" | sed 's/version = "\(.*\)"/\1/')
            if [[ "$CURRENT" == "$VERSION" ]]; then
              echo "❌ $FILE is already at v$VERSION"
              exit 1
            fi
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" "$FILE"
            grep -q "version = \"$VERSION\"" "$FILE" || { echo "❌ Version bump failed for $FILE"; exit 1; }
            echo "✓ Bumped $FILE from $CURRENT to $VERSION"
          done

      - name: Bump npm package versions
        run: |
          for FILE in client/packages/connect/package.json client/packages/sdk/package.json; do
            node -e "
              const fs = require('fs');
              const ver = process.env.VERSION;
              const pkg = JSON.parse(fs.readFileSync('$FILE', 'utf8'));
              if (pkg.version === ver) { console.error('❌ $FILE is already at v' + ver); process.exit(1); }
              console.log('✓ Bumped $FILE from ' + pkg.version + ' to ' + ver);
              pkg.version = ver;
              fs.writeFileSync('$FILE', JSON.stringify(pkg, null, 2) + '\n');
            "
          done

      - name: Update uv lock file
        run: uv lock

      - name: Update npm lock file
        run: npm install --package-lock-only
        working-directory: client

      - name: Export OpenAPI spec from server
        run: uv run python scripts/export_openapi.py

      - name: Regenerate SDKs from OpenAPI spec
        run: bash scripts/generate_sdks.sh

      - name: Push branch and open PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BODY: |
            Bump all packages to v${{ env.VERSION }} and regenerate SDKs.

            **Packages:**
            - `omnidapter` → v${{ env.VERSION }} (PyPI)
            - `omnidapter-server` → v${{ env.VERSION }} (Docker/PyPI)
            - `omnidapter-sdk` → v${{ env.VERSION }} (PyPI)
            - `@omnidapter/connect` → v${{ env.VERSION }} (npm)
            - `@omnidapter/sdk` → v${{ env.VERSION }} (npm)

            Merging this PR will trigger `release-publish` to publish all packages and create a GitHub release.
        run: |
          BRANCH="release/v$VERSION"

          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            echo "❌ Branch $BRANCH already exists. Delete it and rerun."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add \
            omnidapter-core/pyproject.toml \
            omnidapter-server/pyproject.toml \
            omnidapter-sdk/pyproject.toml \
            uv.lock \
            client/packages/connect/package.json \
            client/packages/sdk/package.json \
            client/package-lock.json \
            client/packages/sdk/ \
            omnidapter-sdk/omnidapter_sdk/ \
            openapi/openapi.json
          git commit -m "Release v$VERSION"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Release v$VERSION" \
            --body "$PR_BODY" \
            --label release

          echo "✓ Opened release PR for v$VERSION"
