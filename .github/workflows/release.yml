name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version (e.g., 1.2.3)
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format. Use semver: 1.2.3"
            exit 1
          fi
          echo "✓ Version format valid: $VERSION"

      - name: Check version not already tagged
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "❌ Tag v$VERSION already exists"
            exit 1
          fi
          echo "✓ Version not yet released"

  test:
    needs: validate
    uses: ./.github/workflows/_test-python.yml

  open-pr:
    needs: [validate, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump version in pyproject.toml
        run: |
          VERSION="${{ github.event.inputs.version }}"
          FILE="omnidapter-server/pyproject.toml"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" "$FILE"
          grep -q "version = \"$VERSION\"" "$FILE" && echo "✓ Bumped omnidapter-server to $VERSION"

      - name: Push branch and open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BRANCH="release/v$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add omnidapter-server/pyproject.toml
          git commit -m "Release v$VERSION"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Release v$VERSION" \
            --body "Bump \`omnidapter-server\` to v$VERSION. Merging this PR will publish the Docker image to GHCR and create a GitHub release." \
            --label release

          echo "✓ Opened release PR for v$VERSION"

