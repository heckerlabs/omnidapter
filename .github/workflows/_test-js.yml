name: Test JS Package

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
        description: npm workspace package name

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -w ${{ inputs.package }}
