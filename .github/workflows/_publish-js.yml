name: Publish JS Package

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
        description: npm workspace package name
      package-dir:
        required: true
        type: string
        description: Path to package directory (e.g., client/packages/connect-sdk)
      dry-run:
        required: false
        type: boolean
        default: false
        description: Dry run (build only, don't publish)

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build -w ${{ inputs.package }}

      - name: Publish to npm
        if: ${{ !inputs.dry-run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ${{ inputs.package-dir }}
          npm publish --provenance --access public

      - name: Dry run publish
        if: ${{ inputs.dry-run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ${{ inputs.package-dir }}
          npm publish --dry-run --provenance --access public
          echo "✓ Dry run: npm publish simulation completed"
