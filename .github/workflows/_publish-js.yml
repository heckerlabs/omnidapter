name: Publish JS Package

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
        description: npm workspace package name
      package-dir:
        required: true
        type: string
        description: Path to package directory (e.g., client/packages/connect-sdk)
      version:
        required: true
        type: string
        description: Version to publish (e.g., 1.0.0)
      dry-run:
        required: false
        type: boolean
        default: false
        description: Dry run (build only, don't publish)

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Check version not already on npm
        if: ${{ !inputs.dry-run }}
        run: |
          PACKAGE="${{ inputs.package }}"
          VERSION="${{ inputs.version }}"
          if npm view "$PACKAGE@$VERSION" version 2>/dev/null | grep -qx "$VERSION"; then
            echo "❌ $PACKAGE@$VERSION already exists on npm"
            exit 1
          fi
          echo "✓ $PACKAGE@$VERSION not yet on npm"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build package
        working-directory: client
        run: npm run build -w ${{ inputs.package }}

      - name: Publish to npm
        if: ${{ !inputs.dry-run }}
        run: |
          cd ${{ inputs.package-dir }}
          npm publish --provenance --access public

      - name: Dry run publish
        if: ${{ inputs.dry-run }}
        run: |
          cd ${{ inputs.package-dir }}
          npm publish --dry-run --provenance --access public
          echo "✓ Dry run: npm publish simulation completed"
