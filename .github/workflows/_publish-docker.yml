name: Publish Docker Image

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: Image version tag
      dry-run:
        required: false
        type: boolean
        default: false
        description: Dry run (build only, don't push)

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image (dry run)
        if: ${{ inputs.dry-run }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./omnidapter-server/Dockerfile
          load: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/omnidapter-server:${{ inputs.version }}
            ghcr.io/${{ github.repository_owner }}/omnidapter-server:latest

      - name: Build and push Docker image
        if: ${{ !inputs.dry-run }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./omnidapter-server/Dockerfile
          push: true
          provenance: true
          sbom: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/omnidapter-server:${{ inputs.version }}
            ghcr.io/${{ github.repository_owner }}/omnidapter-server:latest
