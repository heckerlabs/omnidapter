name: Publish Docker Image

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: Image version tag

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Check image not already in GHCR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ inputs.version }}"
          if gh api "/orgs/${{ github.repository_owner }}/packages/container/omnidapter-server/versions" \
              --jq '.[].metadata.container.tags[]' 2>/dev/null | grep -qx "$VERSION"; then
            echo "❌ omnidapter-server:$VERSION already exists in GHCR"
            exit 1
          fi
          echo "✓ omnidapter-server:$VERSION not yet in GHCR"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./omnidapter-server/Dockerfile
          push: true
          provenance: true
          sbom: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/omnidapter-server:${{ inputs.version }}
            ghcr.io/${{ github.repository_owner }}/omnidapter-server:latest
