name: Publish Docker Image

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: Image version tag
      environment:
        required: true
        type: string
        description: GitHub Actions environment

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check image not already in GHCR
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ inputs.version }}"
          OWNER="${{ github.repository_owner }}"
          TAGS=$(gh api --paginate "/user/packages/container/omnidapter-server/versions" \
              --jq '.[].metadata.container.tags[]' 2>&1) || \
          TAGS=$(gh api --paginate "/orgs/$OWNER/packages/container/omnidapter-server/versions" \
              --jq '.[].metadata.container.tags[]' 2>&1) || {
            if echo "$TAGS" | grep -q "404"; then
              echo "✓ Package not yet in GHCR (first release)"
              exit 0
            fi
            echo "❌ Failed to query GHCR: $TAGS"
            exit 1
          }
          if printf '%s\n' "$TAGS" | grep -qx "$VERSION"; then
            echo "::warning::omnidapter-server:$VERSION already exists in GHCR — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "✓ omnidapter-server:$VERSION not yet in GHCR"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: steps.check.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./omnidapter-server/Dockerfile
          push: true
          provenance: true
          sbom: true
          annotations: |
            index:org.opencontainers.image.description=Omnidapter Server — self-hostable calendar integration platform
          tags: |
            ghcr.io/${{ github.repository_owner }}/omnidapter-server:${{ inputs.version }}
            ghcr.io/${{ github.repository_owner }}/omnidapter-server:latest
